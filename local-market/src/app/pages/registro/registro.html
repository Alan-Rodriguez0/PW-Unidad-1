<section class="auth-page">
  <div class="info-side">
    <div class="icon">🛍️</div>
    <h1>Crea tu cuenta</h1>
    <p>Únete a Local Market y comienza a comprar productos increíbles de tu comunidad.</p>

    <ul>
      <li>Compra segura</li>
      <li>Apoya a tu comunidad</li>
      <li>Vende tus productos</li>
    </ul>
  </div>

  <div class="form-card">
    <h2>Registro de usuario</h2>

    <label>Nombre completo</label>
    <input
  type="text"
  placeholder="Ingresa tu nombre completo"
  [(ngModel)]="nombre"
/>

    <label>Correo electrónico</label>
    <input type="email" placeholder="Ingresa tu correo" [(ngModel)]="correo" />

    <label>Teléfono</label>
    <input
  type="text"
  placeholder="Ingresa tu número de teléfono"
  [(ngModel)]="telefono"
/>

    <label>Contraseña</label>
    <input type="password" placeholder="Ingresa tu contraseña" [(ngModel)]="password" />
    <label>Confirmar contraseña</label>
    <input type="password" placeholder="Confirma tu contraseña" />

    <button (click)="registrarse()">
  Crear cuenta
</button>

    <p class="link-text">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Inicia sesión</a>
    </p>
  </div>
</section>
