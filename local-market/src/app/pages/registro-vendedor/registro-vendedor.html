<section class="vendedor-page">
  <div class="form-card">
    <h1>Registro como vendedor</h1>
    <p>Solicita acceso para vender tus productos en Local Market.</p>

    <label>Nombre del negocio</label>
    <input type="text" placeholder="Ej. Abarrotes Don Juan" />

    <label>Nombre del responsable</label>
    <input type="text" placeholder="Nombre completo" />

    <label>Teléfono</label>
    <input type="text" placeholder="Número de contacto" />

    <label>Correo electrónico</label>
    <input type="email" placeholder="Correo del negocio" />

    <label>Ubicación</label>
    <input type="text" placeholder="Comunidad o colonia" />

    <label>Tipo de productos</label>
    <select>
      <option>Alimentos</option>
      <option>Ropa</option>
      <option>Tecnología</option>
      <option>Hogar</option>
      <option>Artesanías</option>
    </select>

    <label>Modalidad</label>
    <select>
      <option>Solicitar aprobación del administrador</option>
      <option>Pagar cuota para vender</option>
    </select>

    <button routerLink="/panel-vendedor">Enviar solicitud</button>
  </div>
</section>
