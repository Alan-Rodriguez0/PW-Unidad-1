<section class="carrito-page">
  <h1>Carrito de compras</h1>

  <div class="carrito-layout">

        <div>
          <h3>Canasta de frutas</h3>

      <div class="item">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500" />
